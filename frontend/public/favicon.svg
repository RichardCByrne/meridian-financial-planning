<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Meridian">
  <!-- Meridian brand mark: a graticule — the meridian line (vertical) crossed
       by latitude ticks. Brass on deep marine, per the brand tokens. -->
  <rect width="32" height="32" rx="6" fill="#0b1f2a"/>
  <g stroke="#b0894a" stroke-width="2" stroke-linecap="round">
    <line x1="9" y1="8"  x2="23" y2="8"/>
    <line x1="9" y1="14" x2="23" y2="14"/>
    <line x1="9" y1="20" x2="23" y2="20"/>
    <line x1="9" y1="26" x2="23" y2="26"/>
    <line x1="16" y1="5" x2="16" y2="27"/>
  </g>
</svg>
