name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which side(s) to deploy"
        type: choice
        options: [both, backend, frontend]
        default: both

permissions:
  contents: read
  id-token: write

# Serialize deploy runs so two manual triggers back-to-back don't race on the
# Cloud Run revision optimistic-concurrency check. cancel-in-progress: false
# queues the second run instead of cancelling — we never want to skip a deploy.
concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.pick.outputs.backend }}
      frontend: ${{ steps.pick.outputs.frontend }}
      ref:      ${{ steps.pick.outputs.ref }}
    steps:
      - id: pick
        run: |
          target="${{ inputs.target || 'both' }}"
          if [[ "$target" == "both" || "$target" == "backend" ]]; then echo "backend=true"  >> $GITHUB_OUTPUT; else echo "backend=false"  >> $GITHUB_OUTPUT; fi
          if [[ "$target" == "both" || "$target" == "frontend" ]]; then echo "frontend=true" >> $GITHUB_OUTPUT; else echo "frontend=false" >> $GITHUB_OUTPUT; fi
          echo "ref=${{ github.sha }}" >> $GITHUB_OUTPUT

  backend:
    needs: gate
    if: needs.gate.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.ref }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Submit Cloud Build
        run: gcloud builds submit --config cloudbuild.yaml --project=${{ vars.GCP_PROJECT_ID }}

  frontend:
    needs: gate
    if: needs.gate.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Upgrade npm (need >=11.10 for min-release-age)
        run: npm install -g npm@latest
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          VITE_DEV_AUTH:             "false"
          VITE_API_URL:              ${{ vars.VITE_API_URL }}
          VITE_FIREBASE_API_KEY:     ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:  ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID:      ${{ vars.VITE_FIREBASE_APP_ID }}
        run: npm run build
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Deploy to Firebase Hosting
        run: npx --yes firebase-tools deploy --only hosting --project=${{ vars.GCP_PROJECT_ID }} --non-interactive
