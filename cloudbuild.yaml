# Google Cloud Build pipeline: build the backend image (with registry layer
# caching), then deploy to Cloud Run.
#
# Required substitutions (set via gcloud or Cloud Build trigger):
#   _REGION                — e.g. europe-west1
#   _REPO                  — Artifact Registry repo name (e.g. meridian)
#   _SERVICE               — Cloud Run service name (e.g. meridian-api)
#
# Secrets pulled from Secret Manager at deploy-time:
#   DATABASE_URL                   — postgresql+psycopg://USER:PASS@HOST/DB?sslmode=require (Neon pooled)
#   FIREBASE_SERVICE_ACCOUNT_JSON  — full JSON, mounted as a file at /secrets/firebase.json
#   ALLOWED_ORIGINS                — comma-separated list of frontend origins

steps:
  # 1. Build + push with Kaniko, which caches every layer (including the
  #    multi-stage builder's pip-install layer) in Artifact Registry. The deps
  #    layer is keyed only on pyproject.toml, so an app-code-only change — the
  #    common case — reuses the cached install and skips pip entirely. This is
  #    the bulk of the cold-build time (fastapi / sqlalchemy / psycopg /
  #    firebase-admin → grpcio / cryptography / pydantic-core).
  - name: gcr.io/kaniko-project/executor:latest
    id: build
    args:
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --context=dir:///workspace/backend
      - --dockerfile=Dockerfile
      - --cache=true
      - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}/cache
      - --cache-ttl=336h

  # 2. Deploy to Cloud Run with secrets mounted (Neon Postgres via plain TCP/TLS).
  #    --cpu-boost gives the cold-start container extra CPU so `alembic upgrade`
  #    + uvicorn import finish faster and the revision goes healthy sooner.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=MERIDIAN_DEV_AUTH=false,FIREBASE_SERVICE_ACCOUNT_PATH=/secrets/firebase.json
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest
      - --set-secrets=/secrets/firebase.json=FIREBASE_SERVICE_ACCOUNT_JSON:latest
      - --cpu=1
      - --memory=512Mi
      - --cpu-boost
      - --max-instances=4
      - --min-instances=0

substitutions:
  _REGION: europe-west1
  _REPO: meridian-financial-planning
  _SERVICE: meridian-api

options:
  # Default machine on purpose: it's covered by Cloud Build's free 120
  # build-min/day (HIGHCPU machines are not and bill from minute 1). Kaniko
  # caching already keeps the common app-only build short, so the bigger machine
  # only helped the rare cold (dep-change) build — not worth forfeiting the free
  # tier on every deploy.
  logging: CLOUD_LOGGING_ONLY
