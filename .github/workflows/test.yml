name: Tests + audits

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        env:
          MERIDIAN_DEV_AUTH: "true"
        run: pytest
      - name: Security audit
        working-directory: backend
        run: pip-audit --skip-editable

  frontend:
    name: Frontend (tsc + vite + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Upgrade npm (need >=11.10 for min-release-age)
        run: npm install -g npm@latest
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Production build
        working-directory: frontend
        env:
          VITE_DEV_AUTH: "true"
        run: npx vite build
      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=moderate
